<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rifa App — Control de 150 números</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080F16; font-family: 'Inter', system-ui, sans-serif; color: #E8F4FF; }
    input, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111C27; }
    ::-webkit-scrollbar-thumb { background: #2E4A62; border-radius: 3px; }
    @keyframes parpadeo { from { opacity:.2; transform:scale(0.8); } to { opacity:1; transform:scale(1.4); } }
    @keyframes entrar { from { transform:scale(0.5) rotate(-10deg); opacity:0; } to { transform:scale(1) rotate(0deg); opacity:1; } }
    @keyframes pulso { 0%,100% { text-shadow:0 0 30px #F5C842,0 0 60px #F5C842; } 50% { text-shadow:0 0 60px #FF9500,0 0 120px #FF9500; } }
    @keyframes flotar { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;

    const TOTAL = 150;
    const PRECIO = 10;
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWFVVMPPtyfa0IETf0ZUV8PR2duRQDmNQXQmReeuPGij_7AoOxzir1y26O8cTOqQXp/exec";

    const ESTADO = { disponible: "disponible", reservado: "reservado", pagado: "pagado" };
    const COLOR = {
      disponible: { bg:"#1E2D3D", border:"#2E4A62", text:"#7A9BB5", hover:"#243648" },
      reservado:  { bg:"#3D2E00", border:"#C8960A", text:"#F5C842", hover:"#4A3800" },
      pagado:     { bg:"#0D3320", border:"#1A8A4A", text:"#2ECC71", hover:"#103D26" },
      ganador:    { bg:"#2D1A00", border:"#FF6B00", text:"#FF9500", hover:"#3A2200" },
    };

    function initNumeros() {
      return Array.from({ length: TOTAL }, (_, i) => ({
        numero: i+1, estado: ESTADO.disponible,
        nombre: "", telefono: "", notas: "", fecha: null, esGanador: false,
      }));
    }

    async function cargarDatos() {
      const res = await fetch(APPS_SCRIPT_URL);
      const json = await res.json();
      if (!json.ok || !json.data || !json.data.length) return null;
      const base = initNumeros();
      json.data.forEach(row => {
        const idx = Number(row.numero) - 1;
        if (idx >= 0 && idx < TOTAL) {
          base[idx] = {
            numero: Number(row.numero),
            estado: row.estado || ESTADO.disponible,
            nombre: row.nombre || "",
            telefono: row.telefono || "",
            notas: row.notas || "",
            fecha: row.fecha || null,
            esGanador: row.esGanador === true || row.esGanador === "TRUE",
          };
        }
      });
      return base;
    }

    async function guardarNumeroSheet(n) {
      const data = encodeURIComponent(JSON.stringify(n));
      await fetch(APPS_SCRIPT_URL + "?action=saveOne&data=" + data);
    }

    async function setGanadorSheet(numero, anular = false) {
      await fetch(APPS_SCRIPT_URL + "?action=setGanador&numero=" + numero + "&anular=" + anular);
    }

    function Badge({ estado, esGanador }) {
      if (esGanador) return (
        <span style={{ background:"#2D1A00", color:"#FF9500", border:"1px solid #FF6B00",
          padding:"2px 10px", borderRadius:20, fontSize:11, fontWeight:700, textTransform:"uppercase" }}>
          🏆 Ganador
        </span>
      );
      const styles = {
        disponible: { background:"#1E2D3D", color:"#7A9BB5", border:"1px solid #2E4A62" },
        reservado:  { background:"#3D2E00", color:"#F5C842", border:"1px solid #C8960A" },
        pagado:     { background:"#0D3320", color:"#2ECC71", border:"1px solid #1A8A4A" },
      };
      return (
        <span style={{ ...styles[estado], padding:"2px 10px", borderRadius:20,
          fontSize:11, fontWeight:700, textTransform:"uppercase" }}>
          {{disponible:"Disponible",reservado:"Reservado",pagado:"Pagado"}[estado]}
        </span>
      );
    }

    function Modal({ numero, onClose, onSave, onAnularGanador }) {
      const [form, setForm] = useState({
        estado: numero.estado, nombre: numero.nombre,
        telefono: numero.telefono, notas: numero.notas,
      });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const inp = {
        width:"100%", background:"#111C27", border:"1px solid #2E4A62", borderRadius:8,
        color:"#E8F4FF", padding:"10px 12px", fontSize:14, outline:"none", fontFamily:"inherit",
      };
      return (
        <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)",
          display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:"#0F1923", border:`1px solid ${numero.esGanador?"#FF6B00":"#2E4A62"}`,
            borderRadius:16, padding:28, width:360, maxWidth:"95vw",
            boxShadow: numero.esGanador?"0 0 40px rgba(255,107,0,0.3)":"0 20px 60px rgba(0,0,0,0.6)" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
              <div>
                <div style={{ color:"#7A9BB5", fontSize:11, textTransform:"uppercase", letterSpacing:1, marginBottom:2 }}>Número</div>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ color:numero.esGanador?"#FF9500":"#F5C842", fontSize:36, fontWeight:900, lineHeight:1 }}>
                    {String(numero.numero).padStart(3,"0")}
                  </div>
                  {numero.esGanador && <span style={{fontSize:22}}>🏆</span>}
                </div>
              </div>
              <button onClick={onClose} style={{ background:"none", border:"none", color:"#7A9BB5", fontSize:22, cursor:"pointer" }}>✕</button>
            </div>
            {numero.esGanador && (
              <div style={{ background:"#2D1A00", border:"1px solid #FF6B00", borderRadius:10,
                padding:"10px 14px", marginBottom:16, display:"flex", alignItems:"center", justifyContent:"space-between", gap:10 }}>
                <span style={{ color:"#FF9500", fontSize:12, fontWeight:600 }}>Este número es el ganador del sorteo</span>
                <button onClick={onAnularGanador} style={{ background:"#FF6B00", border:"none", borderRadius:6,
                  color:"#fff", fontSize:11, fontWeight:700, padding:"5px 10px", cursor:"pointer" }}>Anular</button>
              </div>
            )}
            <div style={{ display:"flex", gap:8, marginBottom:20 }}>
              {Object.values(ESTADO).map(e => (
                <button key={e} onClick={() => set("estado", e)} style={{
                  flex:1, padding:"8px 4px", borderRadius:8, border:"1px solid",
                  borderColor: form.estado===e ? COLOR[e].border : "#2E4A62",
                  background: form.estado===e ? COLOR[e].bg : "#111C27",
                  color: form.estado===e ? COLOR[e].text : "#4A6070",
                  fontSize:11, fontWeight:700, cursor:"pointer", textTransform:"uppercase" }}>
                  {{disponible:"Libre",reservado:"Reservado",pagado:"Pagado"}[e]}
                </button>
              ))}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              {[["nombre","Nombre","Nombre del participante"],["telefono","Teléfono","999 999 999"]].map(([k,l,p]) => (
                <div key={k}>
                  <label style={{ color:"#7A9BB5", fontSize:11, textTransform:"uppercase", display:"block", marginBottom:6 }}>{l}</label>
                  <input style={inp} value={form[k]} onChange={e=>set(k,e.target.value)} placeholder={p} />
                </div>
              ))}
              <div>
                <label style={{ color:"#7A9BB5", fontSize:11, textTransform:"uppercase", display:"block", marginBottom:6 }}>Notas</label>
                <textarea style={{...inp,resize:"vertical",minHeight:60}} value={form.notas} onChange={e=>set("notas",e.target.value)} placeholder="Notas adicionales..." />
              </div>
            </div>
            <div style={{ display:"flex", gap:10, marginTop:20 }}>
              <button onClick={onClose} style={{ flex:1, padding:"12px", borderRadius:10, border:"1px solid #2E4A62",
                background:"transparent", color:"#7A9BB5", fontSize:14, fontWeight:600, cursor:"pointer" }}>Cancelar</button>
              <button onClick={()=>onSave(form)} style={{ flex:2, padding:"12px", borderRadius:10, border:"none",
                background:"linear-gradient(135deg,#F5C842,#E0A800)", color:"#0F1923", fontSize:14, fontWeight:800, cursor:"pointer" }}>Guardar</button>
            </div>
          </div>
        </div>
      );
    }

    function Ruleta({ elegibles, onFin }) {
      const canvasRef = useRef(null);
      const rafRef = useRef(null);
      const N = elegibles.length;
      const slice = (2*Math.PI)/N;
      const PALETA = ["#1a3a5c","#0d3320","#3D2E00","#1a1a3e","#2a1a3e","#003333","#1a2a00","#2a0a0a"];
      useEffect(() => {
        if (!N) return;
        const ganadorIdx = Math.floor(Math.random()*N);
        const totalDestino = (8+Math.random()*4)*2*Math.PI - (ganadorIdx*slice+slice/2);
        let angle=0, vel=0.35, total=0, done=false;
        const draw = () => {
          const c = canvasRef.current; if (!c) return;
          const ctx = c.getContext("2d"), W=c.width, CX=W/2, CY=W/2, R=W/2-12;
          ctx.clearRect(0,0,W,W);
          ctx.save(); ctx.shadowColor="#F5C842"; ctx.shadowBlur=24;
          ctx.beginPath(); ctx.arc(CX,CY,R+4,0,2*Math.PI);
          ctx.strokeStyle="#F5C842"; ctx.lineWidth=3; ctx.stroke(); ctx.restore();
          for (let i=0;i<N;i++) {
            const sA=angle+i*slice, eA=sA+slice;
            ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,sA,eA); ctx.closePath();
            ctx.fillStyle=PALETA[i%PALETA.length]; ctx.fill();
            ctx.strokeStyle="#0F1923"; ctx.lineWidth=1.5; ctx.stroke();
            ctx.save(); ctx.translate(CX,CY); ctx.rotate(sA+slice/2);
            ctx.textAlign="right";
            ctx.fillStyle=i===ganadorIdx?"#F5C842":"#E8F4FF";
            const fs=N>80?8:N>40?10:13;
            ctx.font=`bold ${fs}px Inter,system-ui,sans-serif`;
            ctx.fillText(String(elegibles[i].numero).padStart(3,"0"),R-8,4);
            ctx.restore();
          }
          ctx.beginPath(); ctx.arc(CX,CY,28,0,2*Math.PI);
          const g=ctx.createRadialGradient(CX,CY,4,CX,CY,28);
          g.addColorStop(0,"#F5C842"); g.addColorStop(1,"#8B6800");
          ctx.fillStyle=g; ctx.fill(); ctx.strokeStyle="#0F1923"; ctx.lineWidth=2; ctx.stroke();
          ctx.save(); ctx.translate(CX,8);
          ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-12,-18); ctx.lineTo(12,-18); ctx.closePath();
          ctx.fillStyle="#FF4444"; ctx.shadowColor="#FF0000"; ctx.shadowBlur=10; ctx.fill(); ctx.restore();
        };
        const tick = () => {
          if (done) return;
          if (total<1.5) vel=Math.min(0.35,vel+0.01);
          else { const r=totalDestino-total; if(r<6) vel=Math.max(0.004,r*0.045); }
          angle+=vel; total+=vel; draw();
          if (total>=totalDestino) {
            angle=totalDestino%(2*Math.PI); draw(); done=true;
            setTimeout(()=>onFin(elegibles[ganadorIdx]),400); return;
          }
          rafRef.current=requestAnimationFrame(tick);
        };
        draw(); rafRef.current=requestAnimationFrame(tick);
        return ()=>{ if(rafRef.current) cancelAnimationFrame(rafRef.current); };
      }, []);
      const size=Math.min(300,window.innerWidth-80);
      return <canvas ref={canvasRef} width={size} height={size} style={{borderRadius:"50%",display:"block"}} />;
    }

    function PantallaGanador({ ganador, onCerrar, onAnular }) {
      const [v,setV]=useState(false);
      useEffect(()=>{setTimeout(()=>setV(true),50);},[]);
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)",
          display:"flex", alignItems:"center", justifyContent:"center", zIndex:3000,
          opacity:v?1:0, transition:"opacity 0.4s" }}>
          <div style={{ position:"absolute", inset:0, overflow:"hidden", pointerEvents:"none" }}>
            {Array.from({length:20}).map((_,i)=>(
              <div key={i} style={{ position:"absolute",
                left:`${Math.random()*100}%`, top:`${Math.random()*100}%`,
                width:`${4+Math.random()*8}px`, height:`${4+Math.random()*8}px`,
                borderRadius:"50%", background:["#F5C842","#2ECC71","#FF9500","#fff","#FF6B6B"][i%5],
                animation:`parpadeo ${0.6+Math.random()*1.2}s infinite alternate` }} />
            ))}
          </div>
          <div style={{ background:"linear-gradient(160deg,#0F1923 60%,#1a2a0a)", border:"2px solid #F5C842",
            borderRadius:24, padding:"40px 36px", width:400, maxWidth:"92vw", textAlign:"center",
            boxShadow:"0 0 80px rgba(245,200,66,0.4)", animation:"entrar 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards",
            position:"relative", zIndex:1 }}>
            <div style={{fontSize:56,animation:"flotar 2s ease-in-out infinite",marginBottom:8}}>🏆</div>
            <div style={{color:"#7A9BB5",fontSize:12,textTransform:"uppercase",letterSpacing:3,marginBottom:4}}>¡Tenemos un ganador!</div>
            <div style={{color:"#F5C842",fontSize:88,fontWeight:900,lineHeight:1,animation:"pulso 1.5s ease-in-out infinite",marginBottom:8}}>
              {String(ganador.numero).padStart(3,"0")}
            </div>
            <div style={{color:"#E8F4FF",fontSize:22,fontWeight:700,marginBottom:4}}>{ganador.nombre||"—"}</div>
            {ganador.telefono&&<div style={{color:"#7A9BB5",fontSize:15,marginBottom:16}}>{ganador.telefono}</div>}
            <div style={{display:"flex",gap:10,marginTop:24}}>
              <button onClick={onAnular} style={{flex:1,padding:"12px",borderRadius:10,
                border:"1px solid #FF6B00",background:"transparent",color:"#FF9500",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                Anular ganador
              </button>
              <button onClick={onCerrar} style={{flex:2,padding:"12px",borderRadius:10,border:"none",
                background:"linear-gradient(135deg,#F5C842,#E0A800)",color:"#0F1923",fontSize:14,fontWeight:800,cursor:"pointer"}}>
                ¡Listo!
              </button>
            </div>
          </div>
        </div>
      );
    }

    function SorteoModal({ numeros, onClose, onGanador }) {
      const elegibles = numeros.filter(n=>n.estado===ESTADO.pagado&&!n.esGanador);
      const [fase,setFase]=useState("inicio");
      const [ganador,setGanador]=useState(null);
      const handleFin=(g)=>{setGanador(g);setFase("resultado");onGanador(g);};
      if (fase==="resultado"&&ganador)
        return <PantallaGanador ganador={ganador} onCerrar={onClose} onAnular={()=>{onGanador(null,true);onClose();}} />;
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}>
          <div style={{background:"#0F1923",border:"1px solid #F5C842",borderRadius:24,
            padding:"32px 28px",width:420,maxWidth:"95vw",textAlign:"center",
            boxShadow:"0 0 60px rgba(245,200,66,0.2)"}}>
            <div style={{color:"#F5C842",fontSize:13,textTransform:"uppercase",letterSpacing:2,marginBottom:16}}>🎰 Sorteo</div>
            {fase==="inicio"&&<>
              <div style={{color:"#7A9BB5",marginBottom:24,fontSize:15}}>
                <span style={{color:"#2ECC71",fontWeight:700,fontSize:22}}>{elegibles.length}</span> números pagados participan
              </div>
              {elegibles.length===0
                ?<div style={{color:"#7A9BB5",marginBottom:20}}>No hay números pagados disponibles.</div>
                :<button onClick={()=>setFase("girando")} style={{padding:"16px 48px",borderRadius:12,border:"none",
                    background:"linear-gradient(135deg,#F5C842,#E0A800)",color:"#0F1923",
                    fontSize:18,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 24px rgba(245,200,66,0.4)"}}>
                    ¡Girar ruleta!
                  </button>}
              <br/>
              <button onClick={onClose} style={{marginTop:16,background:"none",border:"none",color:"#7A9BB5",cursor:"pointer",fontSize:13}}>Cancelar</button>
            </>}
            {fase==="girando"&&<>
              <div style={{color:"#7A9BB5",fontSize:12,marginBottom:16}}>Girando entre {elegibles.length} participantes...</div>
              <div style={{display:"flex",justifyContent:"center"}}>
                <Ruleta elegibles={elegibles} onFin={handleFin} />
              </div>
              <div style={{color:"#4A6070",fontSize:11,marginTop:16}}>Espera el resultado...</div>
            </>}
          </div>
        </div>
      );
    }

    function App() {
      const [numeros,setNumeros]=useState(initNumeros);
      const [modal,setModal]=useState(null);
      const [sorteoOpen,setSorteoOpen]=useState(false);
      const [tab,setTab]=useState("tablero");
      const [filtro,setFiltro]=useState("todos");
      const [busqueda,setBusqueda]=useState("");
      const [sync,setSync]=useState("cargando");

      useEffect(()=>{
        cargarDatos()
          .then(d=>{if(d)setNumeros(d);setSync("ok");})
          .catch(()=>setSync("error"));
      },[]);

      const guardarNumero=useCallback((form)=>{
        setNumeros(prev=>{
          const base=prev.find(n=>n.numero===modal.numero);
          const modificado={...base,...form,fecha:base.fecha||new Date().toLocaleDateString("es-PE")};
          const nuevos=prev.map(n=>n.numero===modal.numero?modificado:n);
          setSync("guardando");
          guardarNumeroSheet(modificado)
            .then(()=>setSync("ok"))
            .catch(()=>setSync("error"));
          return nuevos;
        });
        setModal(null);
      },[modal]);

      const registrarGanador=useCallback((ganador,anular=false)=>{
        setNumeros(prev=>prev.map(n=>anular?{...n,esGanador:false}:n.numero===ganador.numero?{...n,esGanador:true}:{...n,esGanador:false}));
        setSync("guardando");
        setGanadorSheet(anular?0:ganador.numero,anular)
          .then(()=>setSync("ok"))
          .catch(()=>setSync("error"));
      },[]);

      const anularGanador=useCallback(()=>{
        setNumeros(prev=>prev.map(n=>({...n,esGanador:false})));
        setModal(null);
        setSync("guardando");
        setGanadorSheet(0,true)
          .then(()=>setSync("ok"))
          .catch(()=>setSync("error"));
      },[]);

      const exportarExcel=()=>{
        const data=numeros.filter(n=>n.estado!==ESTADO.disponible).map(n=>({
          "N°":n.numero,"Estado":n.esGanador?"GANADOR 🏆":n.estado.toUpperCase(),
          "Nombre":n.nombre,"Teléfono":n.telefono,"Notas":n.notas,"Fecha":n.fecha||"",
        }));
        const ws=XLSX.utils.json_to_sheet(data);
        ws["!cols"]=[{wch:6},{wch:14},{wch:24},{wch:14},{wch:22},{wch:14}];
        const wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,ws,"Participantes");
        XLSX.writeFile(wb,"rifa-control.xlsx");
      };

      const participantes=numeros.filter(n=>{
        if(n.estado===ESTADO.disponible)return false;
        if(filtro!=="todos"&&n.estado!==filtro)return false;
        if(busqueda&&!n.nombre.toLowerCase().includes(busqueda.toLowerCase())&&
           !String(n.numero).includes(busqueda)&&!n.telefono.includes(busqueda))return false;
        return true;
      });

      const pct=Math.round((numeros.filter(n=>n.estado===ESTADO.pagado).length/TOTAL)*100);
      const stats={
        disponible:numeros.filter(n=>n.estado===ESTADO.disponible).length,
        reservado:numeros.filter(n=>n.estado===ESTADO.reservado).length,
        pagado:numeros.filter(n=>n.estado===ESTADO.pagado).length,
        recaudado:numeros.filter(n=>n.estado===ESTADO.pagado).length*PRECIO,
        ganador:numeros.find(n=>n.esGanador)||null,
      };

      const syncCfg={
        cargando:{color:"#7A9BB5",bg:"#111C27",border:"#2E4A62",text:"⏳ Cargando..."},
        ok:      {color:"#2ECC71",bg:"#0D3320",border:"#1A8A4A",text:"✓ Sincronizado"},
        guardando:{color:"#F5C842",bg:"#3D2E00",border:"#C8960A",text:"⬆ Guardando..."},
        error:   {color:"#FF6B6B",bg:"#2D0A0A",border:"#FF3333",text:"✕ Error de conexión"},
      }[sync];

      const tabBtn=(t,label)=>(
        <button onClick={()=>setTab(t)} style={{padding:"10px 20px",border:"none",borderRadius:8,
          background:tab===t?"#F5C842":"transparent",color:tab===t?"#0F1923":"#7A9BB5",
          fontSize:13,fontWeight:700,cursor:"pointer"}}>{label}</button>
      );

      if(sync==="cargando") return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
          <div style={{fontSize:28}}>🎰</div>
          <div style={{color:"#F5C842",fontSize:16,fontWeight:700}}>Cargando datos...</div>
          <div style={{color:"#4A6070",fontSize:12}}>Conectando con Google Sheets</div>
        </div>
      );

      return (
        <div style={{minHeight:"100vh"}}>
          <div style={{background:"#0F1923",borderBottom:"1px solid #1C2F40",padding:"16px 20px"}}>
            <div style={{maxWidth:1100,margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
                <div>
                  <div style={{color:"#7A9BB5",fontSize:10,textTransform:"uppercase",letterSpacing:2,marginBottom:2}}>Control de</div>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <div style={{color:"#F5C842",fontSize:20,fontWeight:900}}>RIFA 150 NÚMEROS</div>
                    <span style={{color:syncCfg.color,fontSize:11,fontWeight:600,
                      background:syncCfg.bg,border:`1px solid ${syncCfg.border}`,
                      borderRadius:20,padding:"3px 10px"}}>{syncCfg.text}</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  {stats.ganador&&(
                    <div style={{display:"flex",alignItems:"center",gap:8,
                      background:"#2D1A00",border:"1px solid #FF6B00",borderRadius:8,padding:"8px 14px"}}>
                      <span style={{color:"#FF9500",fontSize:12,fontWeight:700}}>
                        🏆 #{String(stats.ganador.numero).padStart(3,"0")} {stats.ganador.nombre}
                      </span>
                      <button onClick={anularGanador} style={{background:"none",border:"1px solid #FF6B00",
                        borderRadius:6,color:"#FF9500",fontSize:10,fontWeight:700,padding:"3px 8px",cursor:"pointer"}}>Anular</button>
                    </div>
                  )}
                  <button onClick={exportarExcel} style={{padding:"9px 16px",borderRadius:8,
                    border:"1px solid #2E4A62",background:"transparent",color:"#7A9BB5",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                    ⬇ Excel
                  </button>
                  <button onClick={()=>setSorteoOpen(true)} style={{padding:"9px 18px",borderRadius:8,border:"none",
                    background:"linear-gradient(135deg,#F5C842,#E0A800)",color:"#0F1923",fontSize:12,fontWeight:800,cursor:"pointer"}}>
                    🎰 Realizar Sorteo
                  </button>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap"}}>
                {[
                  {label:"Disponibles",val:stats.disponible,color:"#4A6070"},
                  {label:"Reservados", val:stats.reservado, color:"#F5C842"},
                  {label:"Pagados",    val:stats.pagado,    color:"#2ECC71"},
                  {label:"Recaudado",  val:`S/ ${stats.recaudado}`,color:"#2ECC71"},
                ].map(s=>(
                  <div key={s.label} style={{background:"#111C27",borderRadius:10,padding:"10px 16px",minWidth:90}}>
                    <div style={{color:"#4A6070",fontSize:10,textTransform:"uppercase"}}>{s.label}</div>
                    <div style={{color:s.color,fontSize:20,fontWeight:800}}>{s.val}</div>
                  </div>
                ))}
                <div style={{background:"#111C27",borderRadius:10,padding:"10px 16px",flex:1,minWidth:150}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{color:"#4A6070",fontSize:10,textTransform:"uppercase"}}>Progreso pagados</span>
                    <span style={{color:"#F5C842",fontSize:11,fontWeight:700}}>{pct}%</span>
                  </div>
                  <div style={{height:6,background:"#1C2F40",borderRadius:3}}>
                    <div style={{height:"100%",borderRadius:3,width:`${pct}%`,
                      background:"linear-gradient(90deg,#F5C842,#2ECC71)",transition:"width 0.4s"}} />
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:4,marginTop:16}}>
                {tabBtn("tablero","Tablero")}
                {tabBtn("participantes",`Participantes (${stats.reservado+stats.pagado})`)}
              </div>
            </div>
          </div>

          <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 16px"}}>
            {tab==="tablero"&&<>
              <div style={{display:"flex",gap:16,marginBottom:20,flexWrap:"wrap"}}>
                {Object.entries(COLOR).map(([e,c])=>(
                  <div key={e} style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:12,height:12,borderRadius:3,background:c.bg,border:`2px solid ${c.border}`}} />
                    <span style={{color:"#7A9BB5",fontSize:12}}>
                      {{disponible:"Disponible",reservado:"Reservado",pagado:"Pagado",ganador:"Ganador 🏆"}[e]}
                    </span>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(62px,1fr))",gap:6}}>
                {numeros.map(n=>{
                  const c=n.esGanador?COLOR.ganador:COLOR[n.estado];
                  return (
                    <button key={n.numero} onClick={()=>setModal(n)}
                      onMouseEnter={e=>{e.currentTarget.style.background=c.hover;e.currentTarget.style.transform="scale(1.06)";}}
                      onMouseLeave={e=>{e.currentTarget.style.background=c.bg;e.currentTarget.style.transform="scale(1)";}}
                      style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:8,
                        padding:"10px 4px",color:c.text,fontSize:15,fontWeight:800,cursor:"pointer",
                        transition:"all 0.12s",display:"flex",flexDirection:"column",
                        alignItems:"center",gap:3,lineHeight:1,
                        boxShadow:n.esGanador?"0 0 12px rgba(255,107,0,0.5)":"none"}}>
                      {n.esGanador?"🏆":String(n.numero).padStart(3,"0")}
                      {n.nombre&&<span style={{fontSize:7,color:c.text,opacity:.7,
                        maxWidth:54,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {n.esGanador?String(n.numero).padStart(3,"0"):n.nombre.split(" ")[0]}
                      </span>}
                    </button>
                  );
                })}
              </div>
            </>}

            {tab==="participantes"&&<>
              <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
                <input value={busqueda} onChange={e=>setBusqueda(e.target.value)}
                  placeholder="Buscar por nombre, N° o teléfono..."
                  style={{flex:1,minWidth:200,background:"#111C27",border:"1px solid #2E4A62",
                    borderRadius:8,color:"#E8F4FF",padding:"10px 14px",fontSize:13,outline:"none"}} />
                {["todos","reservado","pagado"].map(f=>(
                  <button key={f} onClick={()=>setFiltro(f)} style={{padding:"10px 16px",borderRadius:8,
                    border:"1px solid",borderColor:filtro===f?"#F5C842":"#2E4A62",
                    background:filtro===f?"#3D2E00":"transparent",
                    color:filtro===f?"#F5C842":"#7A9BB5",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                    {{todos:"Todos",reservado:"Reservados",pagado:"Pagados"}[f]}
                  </button>
                ))}
              </div>
              {participantes.length===0
                ?<div style={{textAlign:"center",color:"#4A6070",padding:60,fontSize:15}}>
                    No hay participantes registrados aún.<br/>
                    <span style={{fontSize:13}}>Haz clic en un número en el tablero para registrar.</span>
                  </div>
                :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {participantes.sort((a,b)=>(b.esGanador?1:0)-(a.esGanador?1:0)||a.numero-b.numero).map(n=>(
                    <div key={n.numero} style={{background:n.esGanador?"#1a0f00":"#0F1923",
                      border:`1px solid ${n.esGanador?"#FF6B00":"#1C2F40"}`,borderRadius:10,
                      padding:"12px 16px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",
                      boxShadow:n.esGanador?"0 0 16px rgba(255,107,0,0.2)":"none"}}>
                      <div style={{color:n.esGanador?"#FF9500":"#F5C842",fontSize:20,fontWeight:900,minWidth:44}}>
                        {n.esGanador?"🏆":String(n.numero).padStart(3,"0")}
                      </div>
                      <div style={{flex:1,minWidth:120}}>
                        <div style={{fontWeight:600,fontSize:14}}>
                          {n.esGanador&&<span style={{color:"#FF9500",marginRight:6}}>#{String(n.numero).padStart(3,"0")}</span>}
                          {n.nombre||<span style={{color:"#4A6070"}}>Sin nombre</span>}
                        </div>
                        {n.telefono&&<div style={{color:"#7A9BB5",fontSize:12}}>{n.telefono}</div>}
                        {n.notas&&<div style={{color:"#4A6070",fontSize:11,marginTop:2}}>{n.notas}</div>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                        {n.fecha&&<span style={{color:"#4A6070",fontSize:11}}>{n.fecha}</span>}
                        <Badge estado={n.estado} esGanador={n.esGanador} />
                        {n.esGanador&&(
                          <button onClick={anularGanador} style={{background:"none",border:"1px solid #FF6B00",
                            borderRadius:6,color:"#FF9500",padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:700}}>
                            Anular
                          </button>
                        )}
                        <button onClick={()=>setModal(n)} style={{background:"#111C27",border:"1px solid #2E4A62",
                          borderRadius:6,color:"#7A9BB5",padding:"4px 10px",fontSize:11,cursor:"pointer"}}>
                          Editar
                        </button>
                      </div>
                    </div>
                  ))}
                </div>}
            </>}
          </div>

          {modal&&<Modal numero={modal} onClose={()=>setModal(null)} onSave={guardarNumero} onAnularGanador={anularGanador} />}
          {sorteoOpen&&<SorteoModal numeros={numeros} onClose={()=>setSorteoOpen(false)} onGanador={registrarGanador} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
